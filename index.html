<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Adam's Stag Pub Golf</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;overflow:hidden}
body{background:#0f0f0f;font-family:system-ui,-apple-system,sans-serif;color:#f0f0f0}
#app{max-width:390px;margin:0 auto;height:100%;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen.active{display:flex}
input,textarea{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;color:#f0f0f0;font-size:15px;padding:12px 14px;width:100%;outline:none;font-family:inherit}
input:focus,textarea:focus{border-color:#c8a96e}
.btn{border-radius:12px;font-size:15px;font-weight:600;padding:14px;width:100%;cursor:pointer;font-family:inherit;transition:transform 0.1s;border:none;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(0.97)}
.btn-gold{background:#c8a96e;color:#0f0f0f}
.btn-outline{background:transparent;border:1px solid #333;color:#f0f0f0}
.btn-ghost{background:transparent;border:none;color:#666;font-size:13px;cursor:pointer;font-family:inherit;padding:8px;width:100%}
.btn-icon{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;color:#888;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.btn-icon:active{transform:scale(0.95)}
.card{background:#1a1a1a;border:1px solid #242424;border-radius:16px;padding:16px}
.sips-control{display:flex;align-items:center;background:#111;border:1px solid #2a2a2a;border-radius:12px;overflow:hidden}
.sips-btn{background:transparent;border:none;color:#c8a96e;font-size:26px;font-weight:300;width:60px;height:56px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sips-btn:active{background:#1e1e1e}
.sips-val{flex:1;text-align:center;font-size:28px;font-weight:800}
.dots{display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap;max-width:320px}
.dot{width:7px;height:7px;border-radius:50%;background:#2a2a2a;transition:all 0.2s;cursor:pointer}
.dot.done{background:#3a3a3a}
.dot.active{width:20px;border-radius:4px;background:#c8a96e}
.field-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #222}
.field-row:last-child{border-bottom:none}
.field-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.05em;width:52px;flex-shrink:0}
.field-value{flex:1;font-size:14px;color:#e0e0e0}
.list-item{background:#1a1a1a;border:1px solid #242424;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.list-num{width:28px;height:28px;border-radius:8px;background:#111;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#c8a96e;flex-shrink:0}
.list-name{font-size:14px;font-weight:600;color:#f0f0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-sub{font-size:11px;color:#555;margin-top:2px}
.arrowbtn{background:#111;border:1px solid #222;border-radius:6px;color:#555;width:28px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px}
.arrowbtn:active{background:#1e1e1e;color:#f0f0f0}
.nav-bar{display:flex;gap:8px;padding:12px 16px calc(12px + env(safe-area-inset-bottom, 16px)) 16px;background:#0f0f0f;border-top:1px solid #1a1a1a;flex-shrink:0}
.nav-bar .btn{flex:1;padding:13px 8px;font-size:14px}
.sbadge{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:13px;font-weight:600}
.sg{background:rgba(74,222,128,0.12);color:#4ade80}
.sb{background:rgba(248,113,113,0.12);color:#f87171}
.sn{background:#1e1e1e;color:#555}
.ie-box{display:none;margin-top:6px;margin-bottom:4px;padding:14px;background:#111;border:1px solid #c8a96e;border-radius:14px}
.ff-text{font-style:italic;font-size:12px;color:#888;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1)}
.ff-text.expanded{display:block;overflow:visible}
.ff-more{display:none;text-align:right;margin-top:4px}
.ff-more a{font-size:11px;color:#c8a96e;text-decoration:underline;cursor:pointer;font-style:normal}
.prog-bar-wrap{padding:6px 16px 2px}
.prog-bar-track{height:3px;background:#1e1e1e;border-radius:2px;overflow:hidden}
.prog-bar-fill{height:100%;background:#c8a96e;border-radius:2px;transition:width 0.3s ease}
.prog-label{font-size:10px;color:#444;text-align:right;margin-top:3px;letter-spacing:0.05em}
@keyframes sipPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sip-pop{animation:sipPop 0.25s ease}
@keyframes adamIn{0%{opacity:0;transform:scale(0.4) translateY(16px)}60%{opacity:1;transform:scale(1.08) translateY(-3px)}100%{opacity:1;transform:scale(1)}}
.adam-in{animation:adamIn 0.5s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes adamSwap{0%{transform:scale(1)}35%{transform:scale(0.8) rotate(-5deg);opacity:0.4}70%{transform:scale(1.12) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0)}}
.adam-swap{animation:adamSwap 0.5s ease}
.confetti{position:absolute;top:-14px;width:8px;height:13px;border-radius:2px;pointer-events:none;animation:confFall linear forwards;z-index:50}
@keyframes confFall{to{transform:translateY(105vh) rotate(720deg);opacity:0.7}}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e1e;border:1px solid #c8a96e;border-radius:12px;padding:12px 18px;font-size:13px;color:#f0f0f0;display:flex;align-items:center;gap:14px;z-index:100;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast a{color:#c8a96e;text-decoration:underline;cursor:pointer;font-weight:600}
.result-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #1e1e1e}
.result-row:last-child{border-bottom:none}
.slide-wrap{flex:1;overflow:hidden;position:relative;min-height:0}
.slide{position:absolute;inset:0;overflow-y:auto;padding:14px 16px;transition:transform 0.28s cubic-bezier(0.4,0,0.2,1),opacity 0.28s}
</style>
</head>

    <div><div style="font-size:10px;color:#555;letter-spacing:0.05em">PLAYER</div><div id="gn" style="font-size:14px;font-weight:700;color:#c8a96e"></div></div>
    <div id="gsc"></div>
  </div>
  <div class="prog-bar-wrap" style="flex-shrink:0">
    <div class="prog-bar-track"><div class="prog-bar-fill" id="gprogfill"></div></div>
    <div class="prog-label" id="gproglabel"></div>
  </div>
  <div class="slide-wrap" id="swrap">
    <div class="slide" id="sa" style="transform:translateX(0);opacity:1"></div>
    <div class="slide" id="sb" style="transform:translateX(100%);opacity:0"></div>
  </div>
  <div class="nav-bar" id="gnav"></div>
</div>

<div id="sgl" class="screen">
  <div style="padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1a1a1a">
    <button class="btn-icon" onclick="backToGame()" aria-label="Back"><i class="ti ti-arrow-left" style="font-size:18px"></i></button>
    <div style="flex:1;font-size:16px;font-weight:700">All stops</div>
    <button class="btn-icon" onclick="addStop(true)" aria-label="Add"><i class="ti ti-plus" style="font-size:18px"></i></button>
  </div>
  <div style="flex:1;overflow-y:auto;padding:12px 16px" id="gll"></div>
  <div style="padding:12px 16px;border-top:1px solid #1a1a1a">
    <button class="btn btn-gold" onclick="backToGame()">Back to game</button>
    <button class="btn btn-ghost" onclick="goHome()" style="margin-top:8px">Home</button>
  </div>
</div>

<div id="sf" class="screen" style="position:relative">
  <div style="padding:14px 16px;text-align:center;border-bottom:1px solid #1a1a1a">
    <div style="font-size:10px;color:#555;letter-spacing:0.1em;margin-bottom:4px">FINAL SCORE</div>
    <div id="fn" style="font-size:18px;font-weight:700;color:#c8a96e"></div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:16px">
    <div style="text-align:center;margin-bottom:20px">
      <div id="fsc" style="font-size:60px;font-weight:800;letter-spacing:-2px;line-height:1"></div>
      <div id="flb" style="font-size:13px;color:#666;margin-top:6px"></div>
    </div>
    <div id="ftb" style="margin-bottom:16px"></div>
    <button id="copybtn" class="btn btn-gold" onclick="copyExport()" style="margin-bottom:8px"><i class="ti ti-copy" style="font-size:16px"></i> Copy to clipboard</button>
    <button class="btn btn-outline" onclick="doExport()" style="margin-bottom:8px"><i class="ti ti-download" style="font-size:16px"></i> Export JSON</button>
    <button class="btn btn-ghost" onclick="reviewGame()">Review &amp; edit stops</button>
  </div>
</div>

<div id="sex" class="screen" style="padding:16px;flex-direction:column">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
    <button class="btn-icon" onclick="showS('sf')" aria-label="Back"><i class="ti ti-arrow-left" style="font-size:18px"></i></button>
    <div style="font-size:16px;font-weight:700">Export JSON</div>
  </div>
  <textarea id="extxt" rows="16" style="resize:none;font-size:11px;font-family:monospace;margin-bottom:12px;flex:1" readonly></textarea>
  <button class="btn btn-gold" onclick="showS('sf')">Done</button>
</div>

<div class="toast" id="toast">Stop deleted <a onclick="undoDel()">Undo</a></div>
</div>

const DEF=[
  {name:"DeSoi / PERL",drink:"Mimosa",par:2,sips:0,notes:"",maps:"https://www.google.com/maps/place/?q=place_id:ChIJD9_SzAv_sUARrCKfLPHJ0II",rating:0,fun_fact:"Started as a traditional Romanian delicatessen and wine bar, DeSoi has become one of Bucharest\u2019s most beloved brunch spots, try the salami milana sandwich if they have it. PERL next door transforms from a sunlit caf\u00e9 by day into an intimate late-night bar, inspired by the pearl: a hidden gem that changes with every visit."},
  {name:"Pardon Pub",drink:"Craft beer",par:3,sips:0,notes:"",maps:"https://www.google.com/maps/place/?q=place_id:ChIJo0x9Kkj_sUAR4uR3WFtGJGw",rating:0,fun_fact:"Ranked #8 out of 3,000+ bars in Bucharest, Pardon is a craft beer institution near the Atheneum. They serve Flammkuchen, a thin crispy Alsatian pizza, and there\u2019s reportedly a resident cat. The beer list rotates constantly, so whatever\u2019s on tap today won\u2019t be there next week."},
  {name:"QP Pub",drink:"Craft beer",par:3,sips:0,notes:"",maps:"https://www.google.com/maps/place/?q=place_id:ChIJE4yXZUj_sUARnaNfx0WjgvM",rating:0,fun_fact:"A true Bucharest dive bar staple with an Irish soul: wide whisky selection, cocktails, and legendary Long Island Ice Teas. QP stays open until the last customer leaves, which has been known to cause problems the next morning. Everybody knows everybody here."},
  {name:"Sera Eden",drink:"House cocktail",par:3,sips:0,notes:"",maps:"https://www.google.com/maps/place/?q=place_id:ChIJw90EY9L_sUARo6r9MIEWtKA",rating:0,fun_fact:"Built inside the former greenhouse of the historic Casa Br\u0103tienilor estate, Sera Eden is a lush urban garden hidden behind a gate on Rosetti street. No table service, no reservations, you queue at the bar. Instagram loves it, locals live in it."},
  {name:"Bar Ton",drink:"Wine",par:2,sips:0,notes:"",maps:"https://www.google.com/maps/place/?q=place_id:ChIJRdZqp-X_sUARUoynjmcL4DM",rating:0,fun_fact:"Romania\u2019s first proper listening bar, built inside Bucharest\u2019s first socialist-modernist building from the communist era. The original floors and pillars are still there. Music is ambient and electronic; the rule is conversation-volume only."},
  {name:"Energiea",drink:"Slivovica",par:1,sips:0,notes:"",maps:"https://www.google.com/maps/place/?q=place_id:ChIJaY6CmEH_sUARe59cp55TT5M",rating:0,fun_fact:"A gastropub set in a former printing house just off the Old Town, with high ceilings, original tiled floors, and a raised interior balcony that\u2019s prime cocktail territory. Their daily lunch menu is legendary value: limited portions, so if you\u2019re early you win."},
  {name:"Negroni / Fix Me A Drink",drink:"Cocktail",par:2,sips:0,notes:"",maps:"",rating:0,fun_fact:"FIX is an ingredient-led botanical bar ranked in the global Top 500 bars in 2025, focused on Eastern European botanicals: quince shrub, pollen liqueur, kefir lime. The menu changes with the seasons and what local markets offer. The Negroni next door is the more classic contrast."},
  {name:"Bartini Rooftop",drink:"Espresso Martini",par:2,sips:0,notes:"",maps:"https://www.google.com/maps/place/?q=place_id:ChIJb5pCNgD_sUARQZZpCjZR0bs",rating:0,fun_fact:"Romania\u2019s first dedicated Martini cocktail bar, perched on the rooftop of the former Hotel Royal Palace with panoramic views including the Parliament building. Their signature offer is a Custom Martini, you build your own. Food by Le Bab."}
];

let ST={player:"",stops:[],idx:0,started:false};
let slot="a";

function save(){try{localStorage.setItem("pgs4",JSON.stringify(ST));}catch(e){}}
function loadST(){try{const r=localStorage.getItem("pgs4");if(r){ST=JSON.parse(r);return true;}}catch(e){}return false;}
function showS(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function totalScore(){return ST.stops.reduce((a,s)=>a+(s.sips-s.par),0);}
function scoreLabel(n){return n===0?"Even par":n<0?Math.abs(n)+" under par":n+" over par";}
function badge(n,played){
  if(!played)return'<span class="sbadge sn">No score yet</span>';
  if(n<0)return`<span class="sbadge sg"><i class="ti ti-trending-down" style="font-size:12px"></i> ${Math.abs(n)} under</span>`;
  if(n>0)return`<span class="sbadge sb"><i class="ti ti-trending-up" style="font-size:12px"></i> ${n} over</span>`;
  return'<span class="sbadge sn">Even par</span>';
}

function goSetup(){const n=document.getElementById("pni").value.trim();if(!n){document.getElementById("pni").focus();return;}
  ST.player=n;
  if(!ST.stops.length)ST.stops=JSON.parse(JSON.stringify(DEF));
  save();renderSetup();showS("ss");
}

function ieHTML(i){
  const s=ST.stops[i];
  return`<div style="font-size:11px;color:#c8a96e;font-weight:700;margin-bottom:10px;letter-spacing:0.05em">EDIT STOP ${i+1}</div>
    <div style="margin-bottom:8px"><div style="font-size:10px;color:#555;margin-bottom:4px">BAR NAME</div><input id="ie-nm-${i}" value="${esc(s.name)}" maxlength="40"></div>
    <div style="margin-bottom:8px"><div style="font-size:10px;color:#555;margin-bottom:4px">DRINK</div><input id="ie-dr-${i}" value="${esc(s.drink)}" maxlength="40"></div>
    <div style="margin-bottom:8px"><div style="font-size:10px;color:#555;margin-bottom:4px">PAR (sips)</div><input id="ie-pr-${i}" type="number" value="${s.par}" min="1" max="10" style="width:80px"></div>
    <div style="margin-bottom:12px"><div style="font-size:10px;color:#555;margin-bottom:4px">NOTES</div><textarea id="ie-nt-${i}" rows="2" style="resize:none">${esc(s.notes)}</textarea></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" style="flex:1;padding:10px" onclick="closeIE(event,${i})"><i class="ti ti-x" style="font-size:15px"></i></button>
      <button class="btn btn-gold" style="flex:2;padding:10px" onclick="saveIE(event,${i})"><i class="ti ti-check" style="font-size:15px"></i> Save</button>
    </div>`;
}

function toggleIE(event,prefix,i){
  event.stopPropagation();
  const id=`${prefix}${i}`;
  document.querySelectorAll(".ie-box").forEach(el=>{if(el.id!==id)el.style.display="none";});
  const el=document.getElementById(id);
  if(!el)return;
  if(el.style.display==="block"){el.style.display="none";}
  else{el.innerHTML=ieHTML(i);el.style.display="block";}
}
function closeIE(event,i){event.stopPropagation();document.querySelectorAll(".ie-box").forEach(el=>el.style.display="none");}
function saveIE(event,i){
  event.stopPropagation();
  const nm=document.getElementById(`ie-nm-${i}`);
  const dr=document.getElementById(`ie-dr-${i}`);
  const pr=document.getElementById(`ie-pr-${i}`);
  const nt=document.getElementById(`ie-nt-${i}`);
  if(nm&&nm.value.trim())ST.stops[i].name=nm.value.trim();
  if(dr&&dr.value.trim())ST.stops[i].drink=dr.value.trim();
  if(pr)ST.stops[i].par=Math.max(1,Math.min(10,parseInt(pr.value)||1));
  if(nt)ST.stops[i].notes=nt.value.trim();
  save();
  document.querySelectorAll(".ie-box").forEach(el=>el.style.display="none");
  const active=document.querySelector(".screen.active");
  if(active){
    if(active.id==="ss")renderSetup();
    else if(active.id==="sgl")renderGameList();
    else if(active.id==="sg")renderSlide(ST.idx,null);
  }
}

function renderSetup(){
  document.getElementById("spn").textContent=ST.player;
  document.getElementById("sl").innerHTML=ST.stops.map((s,i)=>`
    <div>
      <div class="list-item">
        <div class="list-num">${i+1}</div>
        <div style="flex:1;min-width:0">
          <div class="list-name">${esc(s.name)}</div>
          <div class="list-sub">${esc(s.drink)} · par ${s.par}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="display:flex;flex-direction:column;gap:3px">
            <div class="arrowbtn" onclick="moveStop(${i},-1,'setup')"><i class="ti ti-chevron-up"></i></div>
            <div class="arrowbtn" onclick="moveStop(${i},1,'setup')"><i class="ti ti-chevron-down"></i></div>
          </div>
          <button class="btn-icon" onclick="toggleIE(event,'ie-s-',${i})" aria-label="Edit"><i class="ti ti-edit" style="font-size:15px;color:#c8a96e"></i></button>
          <button class="btn-icon" onclick="removeStop(${i},'setup')" aria-label="Remove"><i class="ti ti-trash" style="font-size:15px;color:#555"></i></button>
        </div>
      </div>
      <div class="ie-box" id="ie-s-${i}"></div>
    </div>
  `).join("");
}

function moveStop(i,dir,ctx){
  const j=i+dir;if(j<0||j>=ST.stops.length)return;
  [ST.stops[i],ST.stops[j]]=[ST.stops[j],ST.stops[i]];
  if(ST.idx===i)ST.idx=j;else if(ST.idx===j)ST.idx=i;
  save();if(ctx==="setup")renderSetup();else renderGameList();
}
function removeStop(i,ctx){
  ST.stops.splice(i,1);
  if(ST.idx>=ST.stops.length)ST.idx=Math.max(0,ST.stops.length-1);
  save();if(ctx==="setup")renderSetup();else renderGameList();
}
function addStop(fromList){
  ST.stops.push({name:"New stop",drink:"Drink",par:2,sips:0,notes:"",maps:"",rating:0,fun_fact:""});
  save();if(fromList)renderGameList();else renderSetup();
}
function startGame(){
  if(!ST.stops.length)return;
  ST.started=true;ST.idx=0;save();
  renderSlide(0,null);showS("sg");
  reqWakeLock();
}

function renderSlide(idx,dir){
  document.getElementById("gn").textContent=ST.player;
  const anyPlayed=ST.stops.some(s=>s.sips>0);
  document.getElementById("gsc").innerHTML=badge(anyPlayed?totalScore():0,anyPlayed);
  const pct=Math.round(((idx+1)/ST.stops.length)*100);
  document.getElementById("gprogfill").style.width=pct+"%";
  document.getElementById("gproglabel").textContent=(idx+1)+" / "+ST.stops.length;

  const s=ST.stops[idx];
  const diff=s.sips-s.par;
  const sc=diff>0?"#f87171":diff<0?"#4ade80":"#888";
  const imgSrc=diff>0?IMG_OVER_PAR:IMG_UNDER_PAR;

  const html=`
    <div style="margin-bottom:12px">
      <div style="font-size:10px;color:#555;letter-spacing:0.05em;margin-bottom:3px">STOP ${idx+1} OF ${ST.stops.length}</div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div style="font-size:21px;font-weight:800;color:#f0f0f0;line-height:1.2;flex:1">${esc(s.name)}</div>
        <div style="display:flex;gap:6px">
          <button class="btn-icon" onclick="dupStop(${idx})" aria-label="Duplicate stop"><i class="ti ti-copy" style="font-size:15px;color:#c8a96e"></i></button>
          <button class="btn-icon" onclick="toggleIE(event,'ie-g-',${idx})" aria-label="Edit stop"><i class="ti ti-edit" style="font-size:15px;color:#c8a96e"></i></button>
        </div>
      </div>
      <div style="margin-top:8px"><button onclick="openMaps('${esc(s.name)}')" style="display:inline-flex;align-items:center;gap:6px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;padding:8px 12px;color:#c8a96e;text-decoration:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit"><i class="ti ti-map-pin" style="font-size:13px"></i>Open in Maps</button></div>
    </div>
    <div class="ie-box" id="ie-g-${idx}"></div>
    <div class="card" style="margin-bottom:10px">
      <div class="field-row">
        <div class="field-label">Drink</div>
        <div class="field-value">${esc(s.drink)} <span style="color:#444">·</span> <span style="color:#888;font-size:12px">par ${s.par}</span></div>
      </div>
      <div class="field-row" style="${s.fun_fact?'':'border-bottom:none'}">
        <div class="field-label">Notes</div>
        <div class="field-value" style="color:${s.notes?"#e0e0e0":"#444"}">${s.notes||"—"}</div>
      </div>
      ${s.fun_fact?'<div style="padding-top:10px"><div class="ff-text" id="ff-'+idx+'">'+esc(s.fun_fact)+'</div><div class="ff-more" id="ffm-'+idx+'"><a onclick="toggleFF('+idx+')">More</a></div></div>':''}
    </div>
    <div class="card">
      <div style="font-size:10px;color:#555;letter-spacing:0.05em;margin-bottom:10px">SIPS TAKEN</div>
      <div class="sips-control">
        <button class="sips-btn" onclick="chSips(${idx},-1)">−</button>
        <div class="sips-val" style="color:${sc}">${s.sips}</div>
        <button class="sips-btn" onclick="chSips(${idx},1)">+</button>
      </div>
      <div style="text-align:center;margin-top:10px;font-size:13px;font-weight:600;color:${sc}">
        ${s.sips===0?"Tap + to start":diff>0?"+"+diff+" over par":diff<0?Math.abs(diff)+" under par":"Even par"}
      </div>
    </div>
    ${starsHTML(idx,s.rating)}
    ${s.sips>0?'<div class="adam-wrap" style="display:flex;justify-content:center;gap:16px;margin-top:12px;align-items:flex-end"><img src="'+imgSrc+'" style="height:80px;width:auto"><img src="'+imgSrc+'" style="height:80px;width:auto;transform:scaleX(-1)"></div>':'<div style="height:80px;margin-top:12px"></div>'}
  `;

  const ca=slot==="a"?"sa":"sb";
  const cn=slot==="a"?"sb":"sa";
  const ce=document.getElementById(ca);
  const ne=document.getElementById(cn);

  if(dir===null){
    ce.innerHTML=html;ce.style.transition="none";
    ce.style.transform="translateX(0)";ce.style.opacity="1";
    ne.innerHTML="";ne.style.transition="none";
    ne.style.transform="translateX(100%)";ne.style.opacity="0";
    renderNav(idx);setTimeout(()=>checkFF(idx),0);return;
  }
  ne.innerHTML=html;
  ne.style.transition="none";
  ne.style.transform=dir>0?"translateX(100%)":"translateX(-100%)";
  ne.style.opacity="0";
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    ce.style.transition="transform 0.28s cubic-bezier(0.4,0,0.2,1),opacity 0.28s";
    ne.style.transition="transform 0.28s cubic-bezier(0.4,0,0.2,1),opacity 0.28s";
    ce.style.transform=dir>0?"translateX(-100%)":"translateX(100%)";ce.style.opacity="0";
    ne.style.transform="translateX(0)";ne.style.opacity="1";
    slot=slot==="a"?"b":"a";
    setTimeout(()=>{renderNav(idx);checkFF(idx);},30);
  }));
}

function renderNav(idx){
  const isF=idx===0,isL=idx===ST.stops.length-1;
  let h="";
  h+=isF?`<div style="flex:1"></div>`:`<button class="btn btn-outline" onclick="prevStop()"><i class="ti ti-arrow-left" style="font-size:15px"></i> Previous</button>`;
  h+=`<button class="btn btn-outline" style="flex:0 0 46px;padding:0;flex-shrink:0" onclick="goList()"><i class="ti ti-list" style="font-size:17px"></i></button>`;
  h+=isL?`<button class="btn btn-gold" onclick="finish()"><i class="ti ti-trophy" style="font-size:15px"></i> Finish</button>`:`<button class="btn btn-gold" onclick="nextStop()">Next <i class="ti ti-arrow-right" style="font-size:15px"></i></button>`;
  document.getElementById("gnav").innerHTML=h;
}

let delBuf=null,delTimer=null;
function delStop(idx){
  if(ST.stops.length<=1)return;
  if(delBuf){clearTimeout(delTimer);delBuf=null;}
  delBuf={stop:ST.stops[idx],idx:idx};
  ST.stops.splice(idx,1);
  if(ST.idx>=ST.stops.length)ST.idx=ST.stops.length-1;
  save();renderGameList();
  const t=document.getElementById("toast");
  t.classList.add("show");
  delTimer=setTimeout(()=>{delBuf=null;t.classList.remove("show");},5000);
}
function undoDel(){
  if(!delBuf)return;
  clearTimeout(delTimer);
  ST.stops.splice(delBuf.idx,0,delBuf.stop);
  delBuf=null;save();renderGameList();
  document.getElementById("toast").classList.remove("show");
}
function dupStop(idx){
  const src=ST.stops[idx];
  const dup={name:src.name,drink:src.drink,par:src.par,sips:src.sips,notes:src.notes,rating:src.rating||0,fun_fact:src.fun_fact||"",maps:src.maps||""};
  if(src.last_modified)dup.last_modified=src.last_modified;
  ST.stops.splice(idx+1,0,dup);
  ST.idx=idx+1;save();renderSlide(ST.idx,1);
}
function checkFF(idx){
  const el=document.getElementById("ff-"+idx);
  const btn=document.getElementById("ffm-"+idx);
  if(!el||!btn)return;
  if(el.scrollHeight>el.clientHeight+2){btn.style.display="block";}
}
function toggleFF(idx){
  const el=document.getElementById("ff-"+idx);
  const btn=document.getElementById("ffm-"+idx);
  if(!el||!btn)return;
  const expanded=el.classList.contains("expanded");
  if(expanded){
    el.style.maxHeight=el.scrollHeight+"px";
    requestAnimationFrame(()=>{
      el.style.transition="max-height 0.35s cubic-bezier(0.4,0,0.2,1)";
      el.style.maxHeight="2.8em";
      setTimeout(()=>{el.classList.remove("expanded");el.style.maxHeight="";el.style.transition="";},360);
    });
    btn.querySelector("a").textContent="More";
  } else {
    el.classList.add("expanded");
    const h=el.scrollHeight;
    el.style.maxHeight="2.8em";
    requestAnimationFrame(()=>{
      el.style.transition="max-height 0.35s cubic-bezier(0.4,0,0.2,1)";
      el.style.maxHeight=h+"px";
      setTimeout(()=>{el.style.maxHeight="";el.style.transition="";},360);
    });
    btn.querySelector("a").textContent="Less";
  }
}
function goHome(){showS("sn");}
function resetAll(){
  ST.stops.forEach(s=>{s.sips=0;delete s.last_modified;});
  ST.player="";ST.idx=0;ST.started=false;
  document.getElementById("pni").value="";
  save();showS("sn");
}
function starsHTML(idx,rating){
  let h='<div style="display:flex;justify-content:center;gap:8px;margin-top:14px;margin-bottom:4px">';
  for(let i=1;i<=5;i++){
    const icon=i<=rating?"ti-star-filled":"ti-star";
    const col=i<=rating?"#c8a96e":"#333";
    h+='<i class="ti '+icon+'" onclick="setRating('+idx+','+i+')" style="font-size:26px;color:'+col+';cursor:pointer"></i>';
  }
  h+="</div>";
  return h;
}
function setRating(idx,val){
  const s=ST.stops[idx];
  s.rating=s.rating===val?0:val;
  save();renderSlide(idx,null);
}
function openMaps(name){
  const q=encodeURIComponent(name+" Bucharest");
  window.location.href="https://www.google.com/maps/search/?api=1&query="+q;
}
function localTs(){const d=new Date();const pad=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function chSips(idx,d){
  const s=ST.stops[idx];
  const oldSips=s.sips,oldDiff=oldSips-s.par;
  s.sips=Math.max(0,s.sips+d);
  s.last_modified=localTs();
  const newDiff=s.sips-s.par;
  save();renderSlide(idx,null);
  const slideEl=document.getElementById(slot==="a"?"sa":"sb");
  if(!slideEl)return;
  const sv=slideEl.querySelector(".sips-val");
  if(sv&&s.sips!==oldSips){sv.classList.add("sip-pop");}
  const wrap=slideEl.querySelector(".adam-wrap");
  if(wrap){
    if(oldSips===0&&s.sips>0){wrap.classList.add("adam-in");}
    else if(s.sips>0&&oldSips>0&&((oldDiff>0)!==(newDiff>0))){wrap.classList.add("adam-swap");}
  }
}
function markVisited(idx){if(!ST.stops[idx].last_modified)ST.stops[idx].last_modified=localTs();}
function nextStop(){if(ST.idx<ST.stops.length-1){markVisited(ST.idx);ST.idx++;save();renderSlide(ST.idx,1);}}
function prevStop(){if(ST.idx>0){markVisited(ST.idx);ST.idx--;save();renderSlide(ST.idx,-1);}}
function jumpTo(i){if(i===ST.idx)return;markVisited(ST.idx);const d=i>ST.idx?1:-1;ST.idx=i;save();renderSlide(i,d);}
function goList(){renderGameList();showS("sgl");}
function backToGame(){renderSlide(ST.idx,null);showS("sg");}

function renderGameList(){
  document.getElementById("gll").innerHTML=ST.stops.map((s,i)=>{
    const diff=s.sips-s.par;
    const col=s.sips===0?"#444":diff>0?"#f87171":diff<0?"#4ade80":"#888";
    const sc=s.sips===0?"—":diff>0?"+"+diff:""+diff;
    return`<div>
      <div class="list-item" style="${i===ST.idx?"border-color:#c8a96e;":""}">
        <div class="list-num" onclick="jumpToList(${i})" style="cursor:pointer">${i+1}</div>
        <div style="flex:1;min-width:0;cursor:pointer" onclick="jumpToList(${i})">
          <div class="list-name">${esc(s.name)}</div>
          <div class="list-sub">${esc(s.drink)} · par ${s.par}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="font-size:18px;font-weight:800;color:${col};min-width:28px;text-align:right">${sc}</div>
          <div style="display:flex;flex-direction:column;gap:3px">
            <div class="arrowbtn" onclick="moveStop(${i},-1,'list')"><i class="ti ti-chevron-up"></i></div>
            <div class="arrowbtn" onclick="moveStop(${i},1,'list')"><i class="ti ti-chevron-down"></i></div>
          </div>
          <button class="btn-icon" onclick="toggleIE(event,'ie-l-',${i})" aria-label="Edit"><i class="ti ti-edit" style="font-size:14px;color:#c8a96e"></i></button>
          <button class="btn-icon" onclick="delStop(${i})" aria-label="Delete" style="border-color:#3a1a1a"><i class="ti ti-trash" style="font-size:14px;color:#f87171"></i></button>
        </div>
      </div>
      <div class="ie-box" id="ie-l-${i}"></div>
    </div>`;
  }).join("");
}

function jumpToList(i){ST.idx=i;save();renderSlide(i,null);showS("sg");}

function confettiBurst(){
  const colors=["#c8a96e","#4ade80","#f87171","#f0f0f0","#60a5fa","#fbbf24"];
  const cont=document.getElementById("sf");
  for(let i=0;i<44;i++){
    const p=document.createElement("div");
    p.className="confetti";
    p.style.left=Math.random()*100+"%";
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay=(Math.random()*0.7)+"s";
    p.style.animationDuration=(1.8+Math.random()*1.6)+"s";
    cont.appendChild(p);
    setTimeout(()=>p.remove(),4000);
  }
}
function finish(){
  showS("sf");
  confettiBurst();
  document.getElementById("fn").textContent=ST.player;
  const total=totalScore();
  const sc=document.getElementById("fsc");
  sc.textContent=total>0?"+"+total:total;
  sc.style.color=total<0?"#4ade80":total>0?"#f87171":"#888";
  document.getElementById("flb").textContent=scoreLabel(total);
  document.getElementById("ftb").innerHTML=`<div class="card">${ST.stops.map((s,i)=>{
    const diff=s.sips-s.par;
    const col=s.sips===0?"#444":diff>0?"#f87171":diff<0?"#4ade80":"#888";
    return`<div class="result-row">
      <div class="list-num" style="width:22px;height:22px;font-size:11px">${i+1}</div>
      <div style="flex:1;min-width:0;margin-left:8px">
        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.name)}</div>
        <div style="font-size:11px;color:#555">${esc(s.drink)} · par ${s.par}</div>
      </div>
      <div style="font-size:18px;font-weight:800;color:${col};min-width:32px;text-align:right">${s.sips===0?"—":diff>0?"+"+diff:""+diff}</div>
    </div>`;
  }).join("")}</div>`;
}

function reviewGame(){renderGameList();showS("sgl");}
function doExport(){
  const data={player:ST.player,exported:new Date().toISOString(),total_score:totalScore(),score_label:scoreLabel(totalScore()),stops:ST.stops.map((s,i)=>({stop:i+1,bar:s.name,drink:s.drink,par:s.par,sips:s.sips,score:s.sips-s.par,rating:s.rating||0,last_modified:s.last_modified||null,notes:s.notes}))};
  document.getElementById("extxt").value=JSON.stringify(data,null,2);
  showS("sex");
}
function copyExport(){
  const data={player:ST.player,exported:new Date().toISOString(),total_score:totalScore(),score_label:scoreLabel(totalScore()),stops:ST.stops.map((s,i)=>({stop:i+1,bar:s.name,drink:s.drink,par:s.par,sips:s.sips,score:s.sips-s.par,rating:s.rating||0,last_modified:s.last_modified||null,notes:s.notes}))};
  const txt=JSON.stringify(data,null,2);
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.getElementById("copybtn");
    btn.innerHTML='<i class="ti ti-check" style="font-size:16px"></i> Copied!';
    btn.style.background='#4ade80';btn.style.color='#0f0f0f';
    setTimeout(()=>{btn.innerHTML='<i class="ti ti-copy" style="font-size:16px"></i> Copy to clipboard';btn.style.background='';btn.style.color='';},2500);
  }).catch(()=>{doExport();});
}

document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'){
    document.body.style.display='none';
    void document.body.offsetHeight;
    document.body.style.display='';
    reqWakeLock();
  }
});
window.addEventListener('pageshow',function(e){
  if(e.persisted){
    document.body.style.display='none';
    void document.body.offsetHeight;
    document.body.style.display='';
  }
});
let wakeLock=null;
async function reqWakeLock(){
  try{
    if("wakeLock" in navigator&&ST.started){
      wakeLock=await navigator.wakeLock.request("screen");
    }
  }catch(e){}
}
(function setupSwipe(){
  const w=document.getElementById("swrap");
  let sx=0,sy=0,st=0;
  w.addEventListener("touchstart",e=>{
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();
  },{passive:true});
  w.addEventListener("touchend",e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5&&Date.now()-st<600){
      if(dx<0)nextStop();else prevStop();
    }
  },{passive:true});
})();
(function init(){
  const had=loadST();
  if(had){
    ST.stops.forEach((s,i)=>{
      if(s.rating===undefined)s.rating=0;
      if(s.fun_fact===undefined){
        const def=DEF.find(d=>d.name===s.name);
        s.fun_fact=def?def.fun_fact:"";
      }
    });
    save();
  }
  if(had&&ST.player){
    document.getElementById("pni").value=ST.player;
    if(ST.started){renderSlide(ST.idx,null);showS("sg");reqWakeLock();}
    else{renderSetup();showS("ss");}
  } else showS("sn");
})();
</script>
</body>
</html>
